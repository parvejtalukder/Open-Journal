{% extends "dashboard.html" %}

{% block title %}
    Create Post
{% endblock %}

{% block main %}
<div class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow border border-blue-600">
    <h2 class="text-2xl font-semibold text-blue-600 mb-6">Create New Post</h2>
    <form action="/dashboard/posts/create" method="POST" enctype="multipart/form-data" class="space-y-5">
        <div>
            <label class="block text-sm font-medium mb-1 text-blue-400">Post Title</label>
            <input type="text" name="title" required
                class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-blue-400">Category</label>
                <select name="category"
                    class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                    <option value="">Select category</option>
                    <option value="news">News</option>
                    <option value="entertainment">Entertainment</option>
                    <option value="tech">Tech</option>
                    <option value="sports">Sports</option>
                    <!-- <option value="literature">Literature</option> -->
                    <option value="opinion">Opinion</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 text-blue-400">Status</label>
                <select name="status"
                    class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500">
                    <option value="draft" selected>Draft</option>
                    <!-- <option value="published">Published</option> -->
                </select>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <div>
            <label class="block text-sm font-medium mb-1 text-blue-400">Featured Image</label>
            <input type="file" name="image"
                class="w-full text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1 text-blue-400">Author name</label>
            <input type="text" disabled name="author"
                class="w-full text-sm " placeholder="{{ user.name }}">
        </div>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1 text-blue-400">Content</label>
            <textarea name="content" rows="6" required
                class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500"
                placeholder="Write your post here..."></textarea>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t text-blue-400">
            <a href="/dashboard/posts"
                class="px-4 py-2 border rounded-lg hover:bg-gray-100">
                Cancel
            </a>
            <button type="submit"
                class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                Publish Post
            </button>
        </div>

    </form>
</div>
{% endblock %}
