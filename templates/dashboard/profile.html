{% extends "dashboard.html" %}

{% block title %}
    Profile
{% endblock %}

{% block main %}
<div class="w-full flex justify-center items-center lg:py-4">
    <div class="w-full lg:w-2/3 bg-white border border-blue-200 rounded-2xl shadow p-6">
        <div class="flex flex-col items-center text-center mb-6">
            <img 
                src="{{ url_for('static', filename='uploads/' + user.photo) }}" 
                alt="Profile"
                class="w-28 h-28 rounded-full object-cover border-4 border-blue-200 shadow mb-3"
            >

            <h2 class="text-xl font-semibold text-blue-600">
                {{ user.name }}
            </h2>

            <p class="text-sm text-gray-500">@{{ user.username }}</p>

            <span class="mt-2 px-3 py-1 text-xs rounded-full bg-blue-100 text-blue-600">
                {{ user.role | capitalize }}
            </span>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

            <div class="p-4 border rounded-xl bg-gray-50">
                <p class="text-xs text-gray-500">Full Name</p>
                <p class="text-sm font-medium text-gray-800">{{ user.name }}</p>
            </div>

            <div class="p-4 border rounded-xl bg-gray-50">
                <p class="text-xs text-gray-500">Username</p>
                <p class="text-sm font-medium text-gray-800">@{{ user.username }}</p>
            </div>

            <div class="p-4 border rounded-xl bg-gray-50">
                <p class="text-xs text-gray-500">Email</p>
                <p class="text-sm font-medium text-gray-800">{{ user.email }}</p>
            </div>

            <div class="p-4 border rounded-xl bg-gray-50">
                <p class="text-xs text-gray-500">Role</p>
                <p class="text-sm font-medium text-gray-800">{{ user.role }}</p>
            </div>

        </div>

        <div class="mt-6 flex justify-center gap-3 w-full">
            <a href="/dashboard/reset-password"
               class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">
                Change Password
            </a>

            
        </div>
        

    </div>
</div>
{% endblock %}
